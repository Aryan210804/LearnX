<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnX | Admin Panel</title>
  <link rel="icon" href="assets/img/LOGO.jpeg" type="image/jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      background: var(--bg-card);
      padding: 24px 30px;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .admin-header h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(to right, #ff007a, #00d2ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .tab {
      padding: 10px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-muted);
      font-family: var(--font-main);
    }

    .tab.active {
      background: rgba(0, 210, 255, 0.1);
      border-color: #00d2ff;
      color: #00d2ff;
    }

    .tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--text-muted);
    }

    .dashboard-content {
      display: none;
    }

    .dashboard-content.active {
      display: block;
      animation: fadeIn 0.3s ease-out;
    }

    .grid-list {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    }

    .admin-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s;
    }

    .admin-card:hover {
      transform: translateY(-3px);
      border-color: rgba(0, 210, 255, 0.4);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-weight: 700;
      color: #00d2ff;
      font-size: 15px;
    }

    .card-meta {
      color: var(--text-muted);
      font-size: 13px;
    }

    .admin-card p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .remove-btn {
      color: #ff4d4d;
      background: rgba(255, 77, 77, 0.08);
      border: 1px solid rgba(255, 77, 77, 0.2);
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-main);
      transition: all 0.2s;
    }

    .remove-btn:hover {
      background: #ff4d4d;
      color: white;
      border-color: #ff4d4d;
    }

    .no-data {
      color: var(--text-muted);
      font-size: 14px;
      padding: 40px;
      text-align: center;
      grid-column: 1 / -1;
    }

    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .back-link:hover {
      color: var(--primary);
      border-color: var(--primary);
      text-decoration: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .admin-header {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }

      .grid-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body class="dashboard-body">

  <!-- TOP NAVIGATION -->
  <nav class="top-nav">
    <a href="home.html" class="brand">Learn<span>X</span></a>
    
    <div class="top-nav-links">
        <a href="home.html">Home</a>
        <a href="index1.html">Dashboard</a>
        <a href="about.html">About</a>
        <a href="Contact.html">Contact</a>
        <a href="feedback.html">Feedback</a>
        <a href="admin.html" class="admin-link active" id="admin-link" style="display:none;color:#ff4d4d; border-bottom:none;">Admin</a>
    </div>

    <div class="top-nav-actions">
        <div class="top-nav-search">
            <input type="text" placeholder="Search..." />
            <button><i class="fas fa-search"></i></button>
        </div>
        
        <button id="theme-toggle" class="nav-btn nav-btn-outline">
            <i class="fas fa-sun"></i>
        </button>

        <div class="user-pill" style="display:none;">
            <span id="user-display">Learner</span>
            <button class="logout-btn" id="logout-btn" title="Logout">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>

        <div class="auth-btns">
            <a href="index.html" class="nav-btn nav-btn-primary">Login</a>
        </div>

        <button class="hamburger">
            <i class="fas fa-bars"></i>
        </button>
    </div>
  </nav>


  <div class="admin-container">
    <div class="admin-header">
      <h1><i class="fas fa-shield-halved" style="margin-right:10px;"></i>Admin Command Center</h1>
      <a href="index1.html" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('feedback', this)"><i class="fas fa-comments"
          style="margin-right:6px;"></i>Feedbacks</div>
      <div class="tab" onclick="switchTab('users', this)"><i class="fas fa-users"
          style="margin-right:6px;"></i>Manage Users</div>
    </div>

    <div id="feedback-content" class="dashboard-content active">
      <div class="grid-list" id="feedback-list">
        <div class="no-data"><i class="fas fa-spinner fa-spin"></i> Loading feedback...</div>
      </div>
    </div>

    <div id="users-content" class="dashboard-content">
      <div class="grid-list" id="users-list">
        <div class="no-data"><i class="fas fa-spinner fa-spin"></i> Loading users...</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from './assets/js/firebase-init.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
    import { collection, query, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

    const feedbackList = document.getElementById("feedback-list");
    const usersList = document.getElementById("users-list");

    window.switchTab = (tab, el) => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.dashboard-content').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.getElementById(`${tab}-content`).classList.add('active');
    };

    onAuthStateChanged(auth, (user) => {
      if (!user || user.email !== "aryankumar735588@gmail.com") {
        alert("⛔ Unauthorized Access!");
        window.location.href = "index1.html";
        return;
      }

      // Live Feedbacks
      onSnapshot(query(collection(db, "feedback"), orderBy("timestamp", "desc")), (snapshot) => {
        feedbackList.innerHTML = snapshot.empty
          ? '<div class="no-data">No feedback yet.</div>'
          : "";
        snapshot.forEach(docSnap => {
          const data = docSnap.data();
          const date = data.timestamp
            ? new Date(data.timestamp.seconds * 1000).toLocaleDateString()
            : "New";
          const card = document.createElement("div");
          card.className = "admin-card";
          card.innerHTML = `
            <div class="card-header">
              <div>
                <div class="card-title">${data.name || 'Anonymous'}</div>
                <div class="card-meta">${data.email || 'No email'}</div>
              </div>
              <div class="card-meta">${date}</div>
            </div>
            <p>"${data.message || ''}"</p>
          `;
          feedbackList.appendChild(card);
        });
      });

      // Live Users
      onSnapshot(collection(db, "users"), (snapshot) => {
        usersList.innerHTML = snapshot.empty
          ? '<div class="no-data">No users found.</div>'
          : "";
        snapshot.forEach(docSnap => {
          const data = docSnap.data();
          const card = document.createElement("div");
          card.className = "admin-card";
          card.innerHTML = `
            <div class="card-header">
              <div>
                <div class="card-title">${data.name || 'Anonymous'}</div>
                <div class="card-meta">${data.email || 'No email'}</div>
              </div>
              <button class="remove-btn" onclick="removeUser('${docSnap.id}')">
                <i class="fas fa-trash" style="margin-right:4px;"></i>Remove
              </button>
            </div>
          `;
          usersList.appendChild(card);
        });
      });
    });

    window.removeUser = async (id) => {
      if (confirm("Are you sure you want to remove this user?")) {
        try {
          await deleteDoc(doc(db, "users", id));
        } catch (e) {
          alert("Error: " + e.message);
        }
      }
    };
  </script>

  <!-- Shared theme toggle -->
  <script src="assets/js/theme.js"></script>
</body>

</html>
