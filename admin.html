<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnX | Admin Panel</title>
    <link rel="icon" href="assets/img/LOGO.jpeg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            padding: 40px 20px;
            background: #050510;
            color: white;
        }

        .admin-container {
            max-width: 1200px;
            margin: auto;
        }

        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(to right, #ff007a, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .tab {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
        }

        .tab.active {
            background: rgba(0, 210, 255, 0.2);
            border-color: #00d2ff;
            color: #00d2ff;
        }

        .tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
        }

        .dashboard-content {
            display: none;
        }

        .dashboard-content.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        .grid-list {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        }

        .admin-card {
            padding: 25px;
            position: relative;
            transition: all 0.3s;
        }

        .admin-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 210, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .card-title {
            font-weight: 700;
            color: #00d2ff;
        }

        .card-meta {
            opacity: 0.6;
            font-size: 14px;
        }

        .remove-btn {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.2);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }

        .remove-btn:hover {
            background: #ff4d4d;
            color: white;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .header-box {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .grid-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <div class="header-box">
            <h1>Admin Command Center</h1>
            <a href="index1.html" class="back-btn">← Back to Dashboard</a>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('feedback')">Feedbacks</div>
            <div class="tab" onclick="switchTab('users')">Manage Users</div>
        </div>

        <div id="feedback-content" class="dashboard-content active">
            <div class="grid-list" id="feedback-list">
                <div class="no-data">Loading feedback...</div>
            </div>
        </div>

        <div id="users-content" class="dashboard-content">
            <div class="grid-list" id="users-list">
                <div class="no-data">Loading users...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDrOAHTg-BuXyDRcBAV3uxoFHUwIzlV3bU",
            authDomain: "learnx-d823d.firebaseapp.com",
            projectId: "learnx-d823d",
            storageBucket: "learnx-d823d.appspot.com",
            messagingSenderId: "1036419202232",
            appId: "1:1036419202232:web:4f7778b3b4c16f1a61084d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const feedbackList = document.getElementById("feedback-list");
        const usersList = document.getElementById("users-list");

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.dashboard-content').forEach(c => c.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`${tab}-content`).classList.add('active');
        };

        onAuthStateChanged(auth, (user) => {
            if (!user || user.email !== "aryankumar735588@gmail.com") {
                alert("Unauthorized Access!");
                window.location.href = "index1.html";
                return;
            }

            // Live Feedbacks
            onSnapshot(query(collection(db, "feedback"), orderBy("timestamp", "desc")), (snapshot) => {
                feedbackList.innerHTML = snapshot.empty ? '<div class="no-data">No feedback yet.</div>' : "";
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const date = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleDateString() : "New";
                    const card = document.createElement("div");
                    card.className = "admin-card glass-card";
                    card.innerHTML = `
            <div class="card-header">
              <div>
                <div class="card-title">${data.name}</div>
                <div class="card-meta">${data.email}</div>
              </div>
              <div class="card-meta">${date}</div>
            </div>
            <p>"${data.message}"</p>
          `;
                    feedbackList.appendChild(card);
                });
            });

            // Live Users
            onSnapshot(collection(db, "users"), (snapshot) => {
                usersList.innerHTML = snapshot.empty ? '<div class="no-data">No users found.</div>' : "";
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const card = document.createElement("div");
                    card.className = "admin-card glass-card";
                    card.innerHTML = `
            <div class="card-header">
              <div>
                <div class="card-title">${data.name || 'Anonymous'}</div>
                <div class="card-meta">${data.email}</div>
              </div>
              <button class="remove-btn" onclick="removeUser('${docSnap.id}')">Remove Access</button>
            </div>
          `;
                    usersList.appendChild(card);
                });
            });
        });

        window.removeUser = async (id) => {
            if (confirm("Are you sure you want to remove this user from the dashboard?")) {
                try {
                    await deleteDoc(doc(db, "users", id));
                    alert("User removed from management list.");
                } catch (e) {
                    alert("Error deleting user: " + e.message);
                }
            }
        };
    </script>
</body>

</html>

</html>
