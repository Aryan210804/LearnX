<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnX | Contact</title>
  <link rel="icon" href="assets/img/LOGO.jpeg" type="image/jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .contact-container {
      max-width: 450px;
      width: 100%;
      padding: 40px;
      text-align: center;
    }

    h2 {
      font-weight: 700;
      font-size: 32px;
      margin-bottom: 20px;
      color: #00d2ff;
    }

    p {
      margin-bottom: 30px;
      opacity: 0.8;
    }

    .contact-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .contact-icons a {
      color: white;
      background: rgba(255, 255, 255, 0.1);
      transition: 0.3s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      text-decoration: none;
      font-size: 28px;
    }

    .contact-icons a:hover {
      background: #00d2ff;
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
    }

    .back-btn {
      color: #00d2ff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="area">
    <ul class="circles">

      <li></li>
      <li></li>

      <li></li>
      <li></li>
      <li></li>
    </ul>

    <div class="contact-icons">

      <a href="https://www.linkedin.com/in/aryan-kumar-487953297" target="_blank" title="LinkedIn"><i
          class="fab fa-linkedin"></i></a>
      <a href="https://github.com/Aryan210804" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
      <a href="https://www.instagram.com/ak__ojha/" target="_blank" title="Instagram"><i
          class="fab fa-instagram"></i></a>
    </div>
    <a href="index1.html" class="back-btn">← Back to Dashboard</a>
  </div>
</body>

</html>
