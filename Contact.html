<!DOCTYPE html>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .page-container {
      max-width: 600px;
      margin: 60px auto;
      padding: 50px 40px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .page-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 24px;
    }

    .page-content p {
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 30px;
      font-size: 16px;
    }

    .contact-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .contact-icons a {
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      width: 65px;
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-size: 28px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .contact-icons a:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(4, 170, 109, 0.3);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
  </style>
</head>
