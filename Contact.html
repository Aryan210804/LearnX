<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnX | Contact</title>
  <link rel="icon" href="assets/img/LOGO.jpeg" type="image/jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .page-container {
      max-width: 600px;
      margin: 60px auto;
      padding: 50px 40px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .page-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 24px;
    }

    .page-content p {
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 30px;
      font-size: 16px;
    }

    .contact-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .contact-icons a {
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      width: 65px;
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-size: 28px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .contact-icons a:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(4, 170, 109, 0.3);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
  </style>
</head>

<body class="dashboard-body">

  <nav class="top-nav dashboard-topnav">
    <a class="brand" href="home.html">LearnX</a>
    <div class="top-nav-links">
      <a href="home.html">Home</a>
      <a href="index1.html">Dashboard</a>
      <a href="about.html">About</a>
      <a href="Contact.html" class="active">Contact</a>
      <a href="feedback.html">Feedback</a>
    
      <button id="theme-toggle" class="nav-btn" style="background:transparent; color:var(--text); border:1px solid var(--border); margin-left:auto; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; padding: 6px 12px;"><i class="fas fa-sun"></i></button>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="page-container">
      <h1 class="page-title"><i class="fas fa-envelope-open-text" style="margin-right:8px;"></i> Contact Me</h1>

      <div class="page-content">
        <p>Whether you have a question, want to collaborate, or just want to say hi, feel free to connect with me on any
          of the platforms below.</p>

        <div class="contact-icons">
          <a href="mailto:aryankumar735588@gmail.com" title="Email"><i class="fas fa-envelope"></i></a>
          <a href="https://www.linkedin.com/in/aryan-kumar-487953297" target="_blank" title="LinkedIn"><i
              class="fab fa-linkedin"></i></a>
          <a href="https://github.com/Aryan210804" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
          <a href="https://www.instagram.com/ak__ojha/" target="_blank" title="Instagram"><i
              class="fab fa-instagram"></i></a>
        </div>
      </div>

      <a href="index1.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
  </div>


  <script>
    // Theme logic
    const toggleBtn = document.getElementById('theme-toggle');
    const updateThemeIcon = (isDark) => {
      if(toggleBtn) toggleBtn.innerHTML = isDark ? '<i class="fas fa-sun" style="font-size:16px;"></i><span class="theme-text" style="margin-left:5px;">Light</span>' : '<i class="fas fa-moon" style="font-size:16px;"></i><span class="theme-text" style="margin-left:5px;">Dark</span>';
    };
    
    // Check saved theme
    let currentTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', currentTheme);
    window.addEventListener('DOMContentLoaded', () => updateThemeIcon(currentTheme === 'dark'));

    if(toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        let newTheme = theme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme === 'dark');
      });
    }
  </script>
</body>

</html>
