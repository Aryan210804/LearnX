<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnX | Admin Panel</title>
  <link rel="icon" href="assets/img/LOGO.jpeg" type="image/jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .feedback-container {
      width: 100%;
      max-width: 500px;
      padding: 40px;
      margin: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #00d2ff;
      font-size: 32px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
    }

    input,
    textarea {
      width: 100%;
      padding: 15px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
    }

    input:focus,
    textarea:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: #00d2ff;
    }

    textarea {
      height: 120px;
      resize: none;
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.02);
      filter: brightness(1.1);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
    }

    .back-link:hover {
      color: #00d2ff;
    }
  </style>
</head>

<body>

  <!-- Animated Background -->
  <div class="area">
    <ul class="circles">
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
      <li></li>
    </ul>
  </div>

  <div class="feedback-container glass-card">
    <h2>Share Feedback</h2>
    <form id="feedback-form">
      <div class="input-group">
        <label>Name</label>
        <input type="text" id="fb-name" required placeholder="Your Name">
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="fb-email" required placeholder="Your Email">
      </div>
      <div class="input-group">
        <label>Message</label>
        <textarea id="fb-message" required placeholder="How can we improve?"></textarea>
      </div>
      <button type="submit" id="submit-btn">Send Feedback</button>
    </form>
    <a href="index1.html" class="back-link">← Back to Dashboard</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDrOAHTg-BuXyDRcBAV3uxoFHUwIzlV3bU",
      authDomain: "learnx-d823d.firebaseapp.com",
      projectId: "learnx-d823d",
      storageBucket: "learnx-d823d.appspot.com",
      messagingSenderId: "1036419202232",
      appId: "1:1036419202232:web:4f7778b3b4c16f1a61084d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const feedbackForm = document.getElementById("feedback-form");
    const submitBtn = document.getElementById("submit-btn");

    feedbackForm.onsubmit = async (e) => {
      e.preventDefault();

      const name = document.getElementById("fb-name").value;
      const email = document.getElementById("fb-email").value;
      const message = document.getElementById("fb-message").value;

      submitBtn.disabled = true;
      submitBtn.textContent = "Sending...";

      try {
        await addDoc(collection(db, "feedback"), {
          name,
          email,
          message,
          timestamp: serverTimestamp()
        });
        alert("Thank you for your feedback! ❤️");
        feedbackForm.reset();
      } catch (error) {
        console.error("Error adding document: ", error);
        alert("Error sending feedback. Please try again later.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Send Feedback";
      }
    };
  </script>
</body>

</html>
