<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnX | Feedback</title>
  <link rel="icon" href="assets/img/LOGO.jpeg" type="image/jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .page-container {
      max-width: 600px;
      margin: 60px auto;
      padding: 50px 40px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .page-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 24px;
      text-align: center;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text-muted);
      font-size: 14px;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      font-family: inherit;
      transition: all 0.3s;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(4, 170, 109, 0.1);
    }

    .input-group textarea {
      height: 140px;
      resize: vertical;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
    }

    .submit-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(4, 170, 109, 0.3);
    }

    .submit-btn:disabled {
      background: var(--border);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      color: var(--text-muted);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: transparent;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      margin-top: 24px;
      transition: all 0.2s;
      width: 100%;
      justify-content: center;
    }

    .back-btn:hover {
      color: var(--text);
    }
  </style>
</head>

<body class="dashboard-body">

  <nav class="top-nav dashboard-topnav">
    <a class="brand" href="home.html">LearnX</a>
    <div class="top-nav-links">
      <a href="home.html">Home</a>
      <a href="index1.html">Dashboard</a>
      <a href="about.html">About</a>
      <a href="Contact.html">Contact</a>
      <a href="feedback.html" class="active">Feedback</a>
    
      <button id="theme-toggle" class="nav-btn" style="background:transparent; color:var(--text); border:1px solid var(--border); margin-left:auto; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; padding: 6px 12px;"><i class="fas fa-sun"></i></button>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="page-container">
      <h1 class="page-title"><i class="fas fa-comment-dots" style="margin-right:10px;"></i> Share Feedback</h1>

      <form id="feedback-form">
        <div class="input-group">
          <label>Your Name</label>
          <input type="text" id="fb-name" required placeholder="John Doe">
        </div>
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="fb-email" required placeholder="john@example.com">
        </div>
        <div class="input-group">
          <label>How can we improve LearnX?</label>
          <textarea id="fb-message" required placeholder="I would love to see a course on React..."></textarea>
        </div>
        <button type="submit" id="submit-btn" class="submit-btn"><i class="fas fa-paper-plane"></i> Send
          Feedback</button>
      </form>

      <a href="index1.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDrOAHTg-BuXyDRcBAV3uxoFHUwIzlV3bU",
      authDomain: "learnx-d823d.firebaseapp.com",
      projectId: "learnx-d823d",
      storageBucket: "learnx-d823d.appspot.com",
      messagingSenderId: "1036419202232",
      appId: "1:1036419202232:web:4f7778b3b4c16f1a61084d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const feedbackForm = document.getElementById("feedback-form");
    const submitBtn = document.getElementById("submit-btn");

    feedbackForm.onsubmit = async (e) => {
      e.preventDefault();

      const name = document.getElementById("fb-name").value;
      const email = document.getElementById("fb-email").value;
      const message = document.getElementById("fb-message").value;

      submitBtn.disabled = true;
      submitBtn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Sending...";

      try {
        await addDoc(collection(db, "feedback"), {
          name,
          email,
          message,
          timestamp: serverTimestamp()
        });
        alert("Thank you for your feedback! ❤️");
        feedbackForm.reset();
      } catch (error) {
        console.error("Error adding document: ", error);
        alert("Error sending feedback. Please try again later.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = "<i class='fas fa-paper-plane'></i> Send Feedback";
      }
    };
  </script>

  <script>
    // Theme logic
    const toggleBtn = document.getElementById('theme-toggle');
    const updateThemeIcon = (isDark) => {
      if(toggleBtn) toggleBtn.innerHTML = isDark ? '<i class="fas fa-sun" style="font-size:16px;"></i><span class="theme-text" style="margin-left:5px;">Light</span>' : '<i class="fas fa-moon" style="font-size:16px;"></i><span class="theme-text" style="margin-left:5px;">Dark</span>';
    };
    
    // Check saved theme
    let currentTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', currentTheme);
    window.addEventListener('DOMContentLoaded', () => updateThemeIcon(currentTheme === 'dark'));

    if(toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        let newTheme = theme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme === 'dark');
      });
    }
  </script>
</body>

</html>
